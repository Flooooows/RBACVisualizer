services:
  postgres:
    image: postgres:16-alpine
    container_name: rbac-visualizer-postgres
    environment:
      POSTGRES_DB: rbac_visualizer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    image: node:20-alpine
    container_name: rbac-visualizer-backend
    working_dir: /workspace
    command: sh -c "npm install && npm run dev --workspace @rbac/backend"
    environment:
      BACKEND_PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rbac_visualizer?schema=public
    ports:
      - '4000:4000'
    volumes:
      - .:/workspace
    depends_on:
      - postgres

  frontend:
    image: node:20-alpine
    container_name: rbac-visualizer-frontend
    working_dir: /workspace
    command: sh -c "npm install && npm run dev --workspace @rbac/frontend"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api
    ports:
      - '3000:3000'
    volumes:
      - .:/workspace
    depends_on:
      - backend

volumes:
  postgres-data:
